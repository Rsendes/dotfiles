$font = Fira Sans

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    brightness = 0.6
    contrast = 0.9
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    inner_color = rgba(0, 0, 0, 0.3)
    outer_color = rgba(ffb38a99) rgba(ffffff33) 45deg
    check_color = rgba(7ec8a4ee) rgba(33ccffee) 120deg
    fail_color = rgba(f76c6cee) rgba(ff0066ee) 40deg
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = true
    rounding = 10
    font_family = $font
    placeholder_text = <i>Enter password...</i>
    fail_text = <b>$PAMFAIL</b>
    dots_spacing = 0.3
    dots_size = 0.3
    position = 0, -20
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME
    font_size = 80
    font_family = $font
    color = rgba(255, 255, 255, 0.9)
    position = 0, 200
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    font_size = 20
    font_family = $font
    color = rgba(255, 179, 138, 0.8)
    position = 0, 120
    halign = center
    valign = center
}
